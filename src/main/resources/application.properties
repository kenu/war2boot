# Server settings
server.servlet.context-path=/

# View resolver for JSP
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Datasource settings from globals.properties
spring.datasource.driver-class-name=net.sf.log4jdbc.DriverSpy
spring.datasource.url=jdbc:log4jdbc:hsqldb:hsql://127.0.0.1/sampledb
spring.datasource.username=sa
spring.datasource.password=

# Custom properties to be used by eGovFramework
# This value was 'Globals.DbType' in globals.properties
egovframework.globals.dbType=hsql
